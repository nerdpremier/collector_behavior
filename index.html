<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Behavioral-Data</title>
    <style>
        :root {
            --neon: #00ffcc;
            --bg: #0f172a;
            --accent: #ff007a;
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container { width: 100%; max-width: 800px; margin-top: 50px; padding: 20px; }

        /* UI Components */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            min-height: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .progress-container { width: 100%; height: 8px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; margin-bottom: 30px; }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--neon), #0072ff); border-radius: 10px; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); }

        h2 { color: var(--neon); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; }
        p { color: #94a3b8; margin-bottom: 20px; }
        
        .timer { font-size: 3rem; font-weight: 800; color: #fbbf24; font-family: monospace; text-shadow: 0 0 15px rgba(251, 191, 36, 0.3); }

        #gameCanvas {
            width: 100%; height: 350px; background: rgba(0, 0, 0, 0.3); border-radius: 20px;
            position: relative; margin-top: 20px; border: 2px solid rgba(255, 255, 255, 0.05); overflow: hidden;
        }

        .target {
            width: 55px; height: 55px; background: var(--neon); border-radius: 50%;
            position: absolute; cursor: crosshair; display: flex; align-items: center;
            justify-content: center; box-shadow: 0 0 25px var(--neon); font-size: 24px; z-index: 10;
        }

        .main-btn {
            padding: 18px 45px; border: none; border-radius: 50px;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer;
            transition: 0.3s; box-shadow: 0 10px 20px rgba(0, 114, 255, 0.3);
        }

        .main-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(0, 114, 255, 0.4); }

        #typer {
            width: 80%; padding: 15px; border-radius: 15px; border: 2px solid var(--neon);
            background: rgba(0,0,0,0.2); color: white; font-size: 1.8rem; text-align: center; outline: none;
        }

        .maze-road { fill: none; stroke: rgba(255, 255, 255, 0.1); stroke-width: 50; stroke-linecap: round; }
        .maze-trigger { fill: none; stroke: transparent; stroke-width: 60; pointer-events: stroke; }
        #save-status { margin-top: 30px; font-weight: bold; letter-spacing: 1px; transition: 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <div class="progress-container"><div id="overallBar" class="progress-bar"></div></div>
    
    <div id="challengeArea">
        <div class="card">
            <h2>AI Signature Lab</h2>
            <p>ระบบเก็บข้อมูลพฤติกรรมเพื่อสร้างชุดข้อมูลเทรน AI (Fully Normalized)</p>
            <div style="margin-top: 100px;">
                <button class="main-btn" onclick="renderStage()">เริ่มเก็บข้อมูล Signature</button>
            </div>
        </div>
    </div>

    <div id="save-status"></div>
</div>

<script>
    /* -----------------------------------------------------------
       1. DATA COLLECTION (RAW)
    ----------------------------------------------------------- */
    let mouseIntervals = [], clickIntervals = [], keyIntervals = [], idleDurations = [];
    let lastMouse = null, lastClick = null, lastKey = null, lastActivity = Date.now();
    const sessionStart = Date.now();

    const track = () => { lastActivity = Date.now(); };
    document.addEventListener("mousemove", () => { 
        let now = Date.now(); if (lastMouse) mouseIntervals.push(now - lastMouse); 
        lastMouse = now; track(); 
    });
    document.addEventListener("mousedown", () => { 
        let now = Date.now(); if (lastClick) clickIntervals.push(now - lastClick); 
        lastClick = now; track(); 
    });
    document.addEventListener("keydown", () => { 
        let now = Date.now(); if (lastKey) keyIntervals.push(now - lastKey); 
        lastKey = now; track(); 
    });
    
    setInterval(() => {
        let idle = Date.now() - lastActivity;
        if (idle > 1000) { idleDurations.push(idle); track(); }
    }, 1000);

    /* -----------------------------------------------------------
       2. SCALING ENGINE (0 to 1)
    ----------------------------------------------------------- */
    function getScaledStats(raw, type = "general") {
        const fallback = { m: 0, s: 0 };
        if (!raw || raw.length < 2) return fallback;

        // Filter & Outlier Removal
        let filtered = (type === "click") ? raw.filter(v => v >= 60) : (type === "mouse" ? raw.filter(v => v >= 1) : raw);
        let sSorted = [...filtered].sort((a,b) => a-b);
        let q1 = sSorted[Math.floor(sSorted.length * 0.25)], q3 = sSorted[Math.floor(sSorted.length * 0.75)];
        let iqr = q3 - q1;
        let f = filtered.filter(v => v >= (q1 - 1.5 * iqr) && v <= (q3 + 1.5 * iqr));

        if (f.length < 2) return fallback;

        let m = f.reduce((a, b) => a + b, 0) / f.length;
        let s = Math.sqrt(f.reduce((a, b) => a + (b - m) ** 2, 0) / f.length);

        // Max Thresholds for Scaling
        const limits = {
            click: { m: 2000, s: 500 },
            mouse: { m: 100,  s: 50 },
            key:   { m: 1000, s: 300 },
            idle:  { m: 10000, s: 2000 }
        };
        const L = limits[type] || { m: 1000, s: 300 };

        return {
            m: parseFloat(Math.min(m / L.m, 1).toFixed(4)),
            s: parseFloat(Math.min(s / L.s, 1).toFixed(4))
        };
    }

    /* -----------------------------------------------------------
       3. GAME SYSTEM
    ----------------------------------------------------------- */
    const stages = [
        { name: "🎯 Click Hunt", desc: "คลิกเป้าหมาย 10 จุด", type: "click" },
        { name: "🛸 Orbital", desc: "ลากเมาส์ตามเป้าหมาย", time: 10, type: "move" },
        { name: "⌨️ Speed Typer", desc: "พิมพ์คำที่ปรากฏให้ถูกต้อง", type: "type" },
        { name: "🖋️ Steady Hand", desc: "ลากเมาส์ตามเส้นทางห้ามออกนอกกรอบ", type: "steady_path" }
    ];
    let currentStage = 0;
    let timer = null;

    function renderStage() {
        const area = document.getElementById("challengeArea");
        if (currentStage >= stages.length) {
            area.innerHTML = `<div class="card"><div style="font-size:5rem; margin:20px;">🧬</div><h2>ประมวลผลเสร็จสิ้น</h2><p id="final-msg">กำลังแปลงพฤติกรรมเป็นเลขฐาน 0-1 สำหรับเทรน AI...</p></div>`;
            autoExportData(); return;
        }
        let s = stages[currentStage];
        area.innerHTML = `
            <div class="card">
                <small style="color:var(--accent); font-weight:bold;">STAGE 0${currentStage + 1}</small>
                <h2>${s.name}</h2><p>${s.desc}</p>
                <div class="timer" id="timeDisplay">${s.time ? s.time+'s' : '--'}</div>
                <div id="gameCanvas"><button class="main-btn" style="margin-top:125px" onclick="startStage()">เริ่มทดสอบ</button></div>
            </div>`;
    }

    function startStage() {
        let s = stages[currentStage]; const cv = document.getElementById("gameCanvas"); cv.innerHTML = "";
        if (s.type === "click") initClick(cv);
        if (s.type === "move") initMove(cv);
        if (s.type === "type") initType(cv);
        if (s.type === "steady_path") initSteadyPath(cv);
        
        if (s.time) {
            let timeLeft = s.time;
            timer = setInterval(() => {
                timeLeft--; document.getElementById("timeDisplay").innerText = timeLeft + "s";
                if (timeLeft <= 0) finishStage();
            }, 1000);
        }
    }

    function finishStage() { 
        clearInterval(timer); currentStage++; 
        document.getElementById("overallBar").style.width = (currentStage/stages.length*100) + "%"; 
        renderStage(); 
    }

    function initClick(cv) {
        let count = 0;
        function spawn() {
            cv.innerHTML = `<div style="padding:20px; font-weight:bold; color:var(--neon)">HITS: ${count}/10</div>`;
            let t = document.createElement("div"); t.className = "target";
            t.style.left = Math.random()*80+10+"%"; t.style.top = Math.random()*60+20+"%"; t.innerText = "🎯";
            t.onmousedown = () => { count++; if(count<10) spawn(); else finishStage(); };
            cv.appendChild(t);
        } spawn();
    }
    function initMove(cv) {
        let t = document.createElement("div"); t.className = "target"; t.innerText = "🛸"; cv.appendChild(t);
        let a = 0; function anim() { if(currentStage !== 1) return; a += 0.02; t.style.left = (50+Math.cos(a)*35)+"%"; t.style.top = (50+Math.sin(a*0.8)*30)+"%"; requestAnimationFrame(anim); } anim();
    }
    function initType(cv) {
        const words = ["Algorithm", "Cybersecurity", "DeepLearning"]; let idx = 0;
        function update() {
            cv.innerHTML = `<div style="margin-top:70px"><div style="font-size:2.2rem; color:var(--neon); margin-bottom:20px;">${words[idx]}</div><input type="text" id="typer" autofocus autocomplete="off"></div>`;
            document.getElementById("typer").oninput = (e) => { if(e.target.value.toLowerCase() === words[idx].toLowerCase()) { idx++; if(idx<words.length) update(); else finishStage(); } };
        } update();
    }
    function initSteadyPath(cv) {
        cv.innerHTML = `<div class="maze-container"><svg width="100%" height="100%" viewBox="0 0 600 360"><path class="maze-road" d="M 100 60 H 500 V 180 H 100 V 300 H 500" /><path id="mazeTrigger" class="maze-trigger" d="M 100 60 H 500 V 180 H 100 V 300 H 500" /></svg><div id="goal" class="target" style="left:580px; top:300px; width:40px; height:40px; font-size:12px;">GOAL</div></div>`;
        const trig = document.getElementById("mazeTrigger"), goal = document.getElementById("goal");
        trig.onmouseleave = (e) => { if(e.relatedTarget !== goal) alert("⚠️ มือสั่น! เริ่มใหม่"); };
        goal.onmouseenter = () => { trig.onmouseleave = null; finishStage(); };
    }

    /* -----------------------------------------------------------
       4. EXPORT ENGINE (ALL 0-1)
    ----------------------------------------------------------- */
    async function autoExportData() {
        const status = document.getElementById("save-status");
        status.innerHTML = `<span style="color:#60a5fa">⏳ กำลังจัดทำ Signature 100% Normalized...</span>`;

        const totalTime = (Date.now() - sessionStart) / 1000;
        const rawIdle = (idleDurations.reduce((a,b)=>a+b, 0)/1000) / totalTime;
        const rawDensity = (mouseIntervals.length + clickIntervals.length + keyIntervals.length) / totalTime;

        // Construct Final Fully-Scaled Payload
        const fingerprint = {
            mouse_sig: getScaledStats(mouseIntervals, "mouse"),
            click_sig: getScaledStats(clickIntervals, "click"),
            key_sig:   getScaledStats(keyIntervals, "key"),
            idle_sig:  getScaledStats(idleDurations, "idle"),
            features_sig: {
                density: parseFloat(Math.min(rawDensity / 100, 1).toFixed(4)),
                idle_ratio: parseFloat(Math.min(rawIdle, 1).toFixed(4))
            }
        };

        console.log("FINAL PAYLOAD (0-1):", fingerprint);

        try {
            const res = await fetch("/api/save", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(fingerprint)
            });
            if (res.ok) {
                status.style.color = "var(--neon)";
                status.innerText = "✅ บันทึกสำเร็จ: Signature ของคุณถูก Scale เป็น 0-1 พร้อมเทรนแล้ว";
            } else { throw new Error("Server Error"); }
        } catch (err) {
            status.style.color = "var(--accent)";
            status.innerText = "❌ ผิดพลาด: " + err.message;
        }
    }
</script>
</body>
</html>
