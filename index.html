<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ห้องแล็บพฤติกรรม: 5 บททดสอบมหาโหด</title>
<style>
:root { --neon: #00ffcc; --bg: #0f172a; --accent: #ff007a; }
body {
  margin:0; font-family: 'Segoe UI', 'Tahoma', sans-serif;
  background: var(--bg); color: white; overflow: hidden;
}
.container { max-width: 800px; margin: 40px auto; padding: 20px; text-align: center; }
.card {
  background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px);
  padding: 30px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1);
  min-height: 420px; position: relative;
}
.progress-container { width: 100%; height: 6px; background: #222; border-radius: 10px; margin-bottom: 25px; }
.progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--neon), #0072ff); border-radius: 10px; transition: 0.4s; }
h2 { margin-top: 0; color: var(--neon); text-transform: uppercase; letter-spacing: 2px; }
.timer { font-size: 2.5rem; font-weight: bold; color: #ffcc00; font-family: monospace; }

#gameCanvas {
  width: 100%; height: 350px; position: relative; background: rgba(0,0,0,0.4);
  border-radius: 15px; margin-top: 20px; overflow: hidden; border: 2px solid rgba(255,255,255,0.1);
}

.target {
  width: 50px; height: 50px; background: var(--neon); border-radius: 50%;
  position: absolute; cursor: crosshair; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 20px var(--neon); font-size: 20px; z-index: 10;
}

button.main-btn {
  padding: 15px 40px; border: none; border-radius: 50px;
  background: linear-gradient(45deg, #00c6ff, #0072ff);
  color: white; font-weight: bold; cursor: pointer; transition: 0.2s;
}

#exportBtn { display: none; margin: 20px auto; background: var(--accent); box-shadow: 0 0 15px var(--accent); }
#exportBtn:disabled { opacity: 0.5; cursor: not-allowed; }

input#typer {
  width: 80%; padding: 12px; border-radius: 10px; border: 2px solid var(--neon);
  background: transparent; color: white; font-size: 1.5rem; text-align: center; margin-top: 40px; outline: none;
}

/* Maze & Laser Styles */
.maze-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
.maze-road { fill: none; stroke: rgba(255, 255, 255, 0.1); stroke-width: 50; stroke-linecap: round; }
.maze-trigger { fill: none; stroke: transparent; stroke-width: 55; cursor: crosshair; }
.maze-point { width: 50px; height: 50px; border-radius: 50%; position: absolute; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; z-index: 30; }
#start-node { background: var(--accent); left: 60px; top: 60px; box-shadow: 0 0 15px var(--accent); }
#goal-node { background: var(--neon); right: 60px; bottom: 60px; color: #000; box-shadow: 0 0 15px var(--neon); }

.laser { position: absolute; background: #ff0000; box-shadow: 0 0 10px #ff0000; z-index: 25; }
.laser-h { width: 100%; height: 4px; left: 0; }
.laser-v { width: 4px; height: 100%; top: 0; }

@keyframes laserMoveV { 0%, 100% { left: 30%; } 50% { left: 70%; } }
@keyframes laserMoveH { 0%, 100% { top: 20%; } 50% { top: 80%; } }
@keyframes laserRotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

.game-over-flash { animation: flashRed 0.5s; }
@keyframes flashRed { 0%, 100% { background: rgba(0,0,0,0.4); } 50% { background: rgba(255,0,0,0.3); } }

#save-status { margin-top: 15px; font-size: 0.9rem; color: #888; }
</style>
</head>
<body>

<div class="container">
  <div class="progress-container"><div id="overallBar" class="progress-bar"></div></div>
  <div id="challengeArea"></div>
  <button id="exportBtn" class="main-btn" onclick="exportData()">💾 ส่งข้อมูลไปที่ฐานข้อมูล (Neon DB)</button>
  <div id="save-status"></div>
</div>

<script>
/* -----------------------------------------------------------
   1. Data Collection Core (การเก็บข้อมูล)
----------------------------------------------------------- */
let mouseIntervals=[], clickIntervals=[], keyIntervals=[], idleDurations=[];
let lastMouse=null, lastClick=null, lastKey=null, lastActivity=Date.now();

document.addEventListener("mousemove", () => {
  let now = Date.now();
  if(lastMouse) mouseIntervals.push(now - lastMouse);
  lastMouse = now; lastActivity = now;
});
document.addEventListener("mousedown", () => {
  let now = Date.now();
  if(lastClick) clickIntervals.push(now - lastClick);
  lastClick = now; lastActivity = now;
});
document.addEventListener("keydown", () => {
  let now = Date.now();
  if(lastKey) keyIntervals.push(now - lastKey);
  lastKey = now; lastActivity = now;
});

setInterval(() => {
  let idle = Date.now() - lastActivity;
  if(idle > 1000) { idleDurations.push(idle); lastActivity = Date.now(); }
}, 1000);

/* -----------------------------------------------------------
   2. Statistics Math (การคำนวณสถิติ)
----------------------------------------------------------- */
function percentile(arr,p){
  let s=[...arr].sort((a,b)=>a-b);
  if(s.length === 0) return 0;
  let i=(p/100)*(s.length-1);
  let l=Math.floor(i), u=Math.ceil(i);
  return l===u ? s[i] : s[l]+(s[u]-s[l])*(i-l);
}
function removeOutliersIQR(arr){
  if(arr.length < 4) return arr;
  let Q1=percentile(arr,25), Q3=percentile(arr,75);
  let IQR=Q3-Q1;
  return arr.filter(v => v >= (Q1-1.5*IQR) && v <= (Q3+1.5*IQR));
}
function computeFullStats(raw){
  if(raw.length === 0) return { mean: 0, std: 0, count: 0 };
  let filtered = removeOutliersIQR(raw);
  if(filtered.length === 0) filtered = raw;
  let m = filtered.reduce((a,b)=>a+b,0)/filtered.length;
  let v = filtered.reduce((a,b)=>a+(b-m)**2,0)/filtered.length;
  return { mean: Math.round(m), std: Math.round(Math.sqrt(v)), count: filtered.length, raw_count: raw.length };
}

/* -----------------------------------------------------------
   3. Game Logic (ตรรกะเกม)
----------------------------------------------------------- */
const stages = [
  { name: "นักล่าเงา", desc: "คลิกเป้าหมายให้ครบ 10 จุด (ไม่จับเวลา)", type: "click_task" },
  { name: "วงโคจรนีออน", desc: "ลากเมาส์ตามเป้าหมายที่เคลื่อนที่", time: 10, type: "move" },
  { name: "นักพิมพ์มือโปร", desc: "พิมพ์คำที่กำหนดให้ถูกต้อง", type: "type_task" },
  { name: "ปฏิกิริยาตอบสนอง", desc: "คลิกหน้าจอให้ทันตอนเปลี่ยนสี 3 ครั้ง", type: "reflex_task" },
  { name: "ภารกิจหนีเลเซอร์", desc: "ลากเมาส์ไปที่ GOAL โดยห้ามโดนเลเซอร์!", type: "laser_evasion" }
];

let currentStage = 0;
let timer = null;
let timeLeft = 0;

function renderStage() {
  if(currentStage >= stages.length) {
    document.getElementById("challengeArea").innerHTML = `
      <div class="card">
        <h2>วิเคราะห์ข้อมูลเสร็จสิ้น! 🏆</h2>
        <p>คุณได้ทำการทดสอบครบทุกด่านแล้ว ข้อมูลพฤติกรรมถูกรวบรวมไว้เรียบร้อย</p>
      </div>`;
    document.getElementById("exportBtn").style.display = "block";
    return;
  }
  let s = stages[currentStage];
  document.getElementById("challengeArea").innerHTML = `
    <div class="card">
      <small>STAGE ${currentStage + 1} / ${stages.length}</small>
      <h2>${s.name}</h2>
      <p>${s.desc}</p>
      <div class="timer" id="timeDisplay">${s.time ? s.time + ' วินาที' : '--'}</div>
      <div id="gameCanvas">
        <button class="main-btn" style="margin-top:140px" onclick="startStage()">เริ่มทดสอบ</button>
      </div>
    </div>`;
}

function startStage() {
  let s = stages[currentStage];
  const canvas = document.getElementById("gameCanvas");
  canvas.innerHTML = "";

  if(s.type === "click_task") initClickTask(canvas);
  if(s.type === "move") initMoveTask(canvas);
  if(s.type === "type_task") initTypeTask(canvas);
  if(s.type === "reflex_task") initReflexTask(canvas);
  if(s.type === "laser_evasion") initLaserTask(canvas);

  if(s.time) {
    timeLeft = s.time;
    timer = setInterval(() => {
      timeLeft--;
      document.getElementById("timeDisplay").innerText = timeLeft + " วินาที";
      if(timeLeft <= 0) finishStage();
    }, 1000);
  }
}

function finishStage() {
    clearInterval(timer);
    currentStage++;
    document.getElementById("overallBar").style.width = (currentStage/stages.length*100) + "%";
    renderStage();
}

// STAGE 1
function initClickTask(cv) {
  let count = 0;
  function spawn() {
    cv.innerHTML = `<div style="padding:15px">Progress: ${count}/10</div>`;
    let t = document.createElement("div"); t.className = "target";
    t.style.left = Math.random()*85+"%"; t.style.top = Math.random()*60+20+"%";
    t.innerText = "🎯"; 
    t.onmousedown = () => { count++; if(count < 10) spawn(); else finishStage(); };
    cv.appendChild(t);
  }
  spawn();
}

// STAGE 2
function initMoveTask(cv) {
  let t = document.createElement("div"); t.className = "target"; t.innerText = "🛸"; cv.appendChild(t);
  let a = 0;
  function anim() { 
    if(currentStage !== 1) return; 
    a += 0.03; t.style.left = (50 + Math.cos(a)*35)+"%"; t.style.top = (50 + Math.sin(a*0.8)*35)+"%"; 
    requestAnimationFrame(anim); 
  }
  anim();
}

// STAGE 3
function initTypeTask(cv) {
  const words = ["ไม่อยากเรียนRMSE", "พิมพ์ไวๆหน่อยเด้อ", "อยากนอนแล้ว"];
  let idx = 0;
  function update() {
    cv.innerHTML = `<div style="margin-top:60px"><div style="font-size:2rem; color:var(--neon); margin-bottom:20px">${words[idx]}</div><input type="text" id="typer" autofocus autocomplete="off"></div>`;
    const input = document.getElementById("typer");
    input.focus();
    input.oninput = (e) => { if(e.target.value === words[idx]) { idx++; if(idx < words.length) update(); else finishStage(); } };
  }
  update();
}

// STAGE 4
function initReflexTask(cv) {
  let count = 0;
  function next() {
    cv.style.background = "rgba(0,0,0,0.3)";
    cv.innerHTML = `<p style="margin-top:140px">รอสัญญาณ... (${count}/3)</p>`;
    setTimeout(() => {
      if(currentStage !== 3) return;
      cv.style.background = "var(--accent)";
      cv.innerHTML = `<p style="margin-top:140px; font-weight:bold; font-size:1.5rem">คลิกเดี๋ยวนี้!</p>`;
      cv.onmousedown = () => { cv.onmousedown = null; count++; if(count < 3) next(); else { cv.style.background="transparent"; finishStage(); } };
    }, Math.random() * 2000 + 1000);
  }
  next();
}

// STAGE 5 (Laser Evasion)
function initLaserTask(cv) {
  cv.innerHTML = `
    <div class="maze-container" id="mazeCont">
      <svg width="600" height="350" viewBox="0 0 600 350">
        <path class="maze-road" d="M 100 80 H 500 V 270 H 100 Z" />
        <path id="mazeTrigger" class="maze-trigger" d="M 100 80 H 500 V 270 H 100 Z" />
      </svg>
      <div id="start-node" class="maze-point">START</div>
      <div id="goal-node" class="maze-point">GOAL</div>
      <div class="laser laser-v" style="height:100px; animation: laserMoveV 3s infinite ease-in-out;"></div>
      <div class="laser laser-h" style="width:100px; animation: laserMoveH 4s infinite ease-in-out;"></div>
      <div class="laser" id="rotLaser" style="width:120px; height:4px; top:50%; left:50%; transform-origin:center; animation: laserRotate 4s infinite linear;"></div>
    </div>
  `;
  const cont = document.getElementById("mazeCont");
  const trig = document.getElementById("mazeTrigger");
  const goal = document.getElementById("goal-node");
  const lasers = document.querySelectorAll(".laser");

  trig.onmouseleave = () => { cont.classList.add("game-over-flash"); setTimeout(()=>cont.classList.remove("game-over-flash"), 500); };
  lasers.forEach(l => l.onmouseenter = () => { cont.classList.add("game-over-flash"); setTimeout(()=>cont.classList.remove("game-over-flash"), 500); });
  goal.onmouseenter = () => { trig.onmouseleave = null; finishStage(); };
}

/* -----------------------------------------------------------
   4. Netlify & Neon DB Integration (การบันทึกข้อมูล)
----------------------------------------------------------- */
async function exportData() {
  const statusMsg = document.getElementById("save-status");
  const btn = document.getElementById("exportBtn");
  
  btn.disabled = true;
  statusMsg.innerText = "⏳ กำลังเชื่อมต่อกับฐานข้อมูล Neon Database...";

  const finalPayload = {
    mouse: computeFullStats(mouseIntervals),
    click: computeFullStats(clickIntervals),
    key: computeFullStats(keyIntervals),
    idle: computeFullStats(idleDurations)
  };

  try {
    const response = await fetch("/.netlify/functions/save-behavior", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(finalPayload)
    });

    if (response.ok) {
      statusMsg.style.color = "var(--neon)";
      statusMsg.innerText = "สำเร็จ! ข้อมูลถูกบันทึกลงฐานข้อมูลแล้ว ✅";
    } else {
      throw new Error("ระบบฐานข้อมูลขัดข้อง");
    }
  } catch (err) {
    statusMsg.style.color = "var(--accent)";
    statusMsg.innerText = "❌ เกิดข้อผิดพลาด: " + err.message;
    btn.disabled = false;
  }
}

renderStage();
</script>
</body>
</html>
