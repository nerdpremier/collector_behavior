<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Behavior-RMSE-CY33</title>
<style>
:root { --neon: #00ffcc; --bg: #0f172a; --accent: #ff007a; }
body {
  margin:0; font-family: 'Segoe UI', sans-serif;
  background: var(--bg); color: white; overflow: hidden;
}
.container { max-width: 800px; margin: 40px auto; padding: 20px; text-align: center; }
.card {
  background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px);
  padding: 30px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1);
  min-height: 440px; position: relative;
}
.progress-container { width: 100%; height: 6px; background: #222; border-radius: 10px; margin-bottom: 25px; }
.progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--neon), #0072ff); border-radius: 10px; transition: 0.4s; }
h2 { margin-top: 0; color: var(--neon); text-transform: uppercase; letter-spacing: 2px; }
.timer { font-size: 2.5rem; font-weight: bold; color: #ffcc00; font-family: monospace; }

#gameCanvas {
  width: 100%; height: 360px; position: relative; background: rgba(0,0,0,0.5);
  border-radius: 15px; margin-top: 20px; overflow: hidden; border: 2px solid rgba(255,255,255,0.1);
}

.target {
  width: 50px; height: 50px; background: var(--neon); border-radius: 50%;
  position: absolute; cursor: crosshair; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 20px var(--neon); font-size: 20px; z-index: 10;
}

button.main-btn {
  padding: 15px 40px; border: none; border-radius: 50px;
  background: linear-gradient(45deg, #00c6ff, #0072ff);
  color: white; font-weight: bold; cursor: pointer; transition: 0.2s;
}

#exportBtn { display: none; margin: 20px auto; background: var(--accent); box-shadow: 0 0 15px var(--accent); }
#exportBtn:disabled { opacity: 0.5; cursor: not-allowed; }

/* STAGE 5: Steady Path Styles (Balanced) */
.maze-container { 
  position: relative; width: 100%; height: 100%; 
  display: flex; justify-content: center; align-items: center; cursor: crosshair; 
}
.maze-road { 
  fill: none; stroke: rgba(255, 255, 255, 0.15); stroke-width: 45; 
  stroke-linecap: round; stroke-linejoin: round; 
}
.maze-trigger { 
  fill: none; stroke: transparent; stroke-width: 55; 
  pointer-events: stroke; stroke-linecap: round; stroke-linejoin: round; 
}
.maze-point { 
  width: 50px; height: 50px; border-radius: 50%; position: absolute; 
  display: flex; align-items: center; justify-content: center; 
  font-size: 11px; font-weight: bold; z-index: 30; 
  transform: translate(-50%, -50%); 
}

input#typer {
  width: 80%; padding: 12px; border-radius: 10px; border: 2px solid var(--neon);
  background: transparent; color: white; font-size: 1.5rem; text-align: center; margin-top: 40px; outline: none;
}
#save-status { margin-top: 15px; font-size: 0.9rem; color: #888; }
</style>
</head>
<body>

<div class="container">
  <div class="progress-container"><div id="overallBar" class="progress-bar"></div></div>
  <div id="challengeArea"></div>
  <button id="exportBtn" class="main-btn" onclick="exportData()">💾 บันทึกสถิติลง Neon DB</button>
  <div id="save-status"></div>
</div>

<script>
/* --- DATA COLLECTION --- */
let mouseIntervals=[], clickIntervals=[], keyIntervals=[], idleDurations=[];
let lastMouse=null, lastClick=null, lastKey=null, lastActivity=Date.now();

document.addEventListener("mousemove", () => {
  let now = Date.now();
  if(lastMouse) mouseIntervals.push(now - lastMouse);
  lastMouse = now; lastActivity = now;
});
document.addEventListener("mousedown", () => {
  let now = Date.now();
  if(lastClick) clickIntervals.push(now - lastClick);
  lastClick = now; lastActivity = now;
});
document.addEventListener("keydown", () => {
  let now = Date.now();
  if(lastKey) keyIntervals.push(now - lastKey);
  lastKey = now; lastActivity = now;
});

setInterval(() => {
  let idle = Date.now() - lastActivity;
  if(idle > 1000) { idleDurations.push(idle); lastActivity = Date.now(); }
}, 1000);

/* --- STATS CALCULATOR --- */
function percentile(arr,p){
  let s=[...arr].sort((a,b)=>a-b);
  if(!s.length) return 0;
  let i=(p/100)*(s.length-1);
  let l=Math.floor(i), u=Math.ceil(i);
  return l===u ? s[i] : s[l]+(s[u]-s[l])*(i-l);
}
function removeOutliers(arr){
  if(arr.length < 4) return arr;
  let Q1=percentile(arr,25), Q3=percentile(arr,75);
  let IQR=Q3-Q1;
  return arr.filter(v => v >= (Q1-1.5*IQR) && v <= (Q3+1.5*IQR));
}
function getStats(raw){
  if(!raw.length) return { mean: 0, std: 0, variance: 0, count: 0 };
  let f = removeOutliers(raw);
  let m = f.reduce((a,b)=>a+b,0)/f.length;
  let v = f.reduce((a,b)=>a+(b-m)**2,0)/f.length;
  return { 
    mean: Math.round(m), 
    std: Math.round(Math.sqrt(v)), 
    variance: Math.round(v), 
    count: f.length 
  };
}

/* --- GAME ENGINE --- */
const stages = [
  { name: "🎯 Click Hunt", desc: "คลิกเป้าหมาย 10 จุด", type: "click" },
  { name: "🛸 Orbital", desc: "ลากเมาส์ตามเป้าหมาย (10 วินาที)", time: 10, type: "move" },
  { name: "⌨️ Speed Typer", desc: "พิมพ์คำที่กำหนดให้ถูกต้อง", type: "type" },
  { name: "⚡ Reflex", desc: "คลิกเมื่อจอเปลี่ยนเป็นสีชมพู (3 ครั้ง)", type: "reflex" },
  { name: "🖋️ Steady Hand", desc: "ลากเมาส์ตามทาง: ห้ามออกนอกกรอบสีขาว!", type: "steady_path" }
];

let currentStage = 0;
let timer = null;

function renderStage() {
  if(currentStage >= stages.length) {
    document.getElementById("challengeArea").innerHTML = `
      <div class="card">
        <h2>ทดสอบเสร็จสิ้น! 🏆</h2>
        <p>วิเคราะห์พฤติกรรมเรียบร้อยแล้ว กรุณากดบันทึกสถิติ</p>
      </div>`;
    document.getElementById("exportBtn").style.display = "block";
    return;
  }
  let s = stages[currentStage];
  document.getElementById("challengeArea").innerHTML = `
    <div class="card">
      <small>ด่าน ${currentStage + 1} / ${stages.length}</small>
      <h2>${s.name}</h2>
      <p>${s.desc}</p>
      <div class="timer" id="timeDisplay">${s.time ? s.time + 's' : '--'}</div>
      <div id="gameCanvas">
        <button class="main-btn" style="margin-top:140px" onclick="startStage()">เริ่มภารกิจ</button>
      </div>
    </div>`;
}

function startStage() {
  let s = stages[currentStage];
  const canvas = document.getElementById("gameCanvas");
  canvas.innerHTML = "";

  if(s.type === "click") initClick(canvas);
  if(s.type === "move") initMove(canvas);
  if(s.type === "type") initType(canvas);
  if(s.type === "reflex") initReflex(canvas);
  if(s.type === "steady_path") initSteadyPath(canvas);

  if(s.time) {
    let timeLeft = s.time;
    timer = setInterval(() => {
      timeLeft--;
      document.getElementById("timeDisplay").innerText = timeLeft + "s";
      if(timeLeft <= 0) finishStage();
    }, 1000);
  }
}

function finishStage() {
  clearInterval(timer);
  currentStage++;
  document.getElementById("overallBar").style.width = (currentStage/stages.length*100) + "%";
  renderStage();
}

/* --- STAGE LOGIC --- */
function initClick(cv) {
  let count = 0;
  function spawn() {
    cv.innerHTML = `<div style="padding:15px">แต้ม: ${count}/10</div>`;
    let t = document.createElement("div"); t.className = "target";
    t.style.left = Math.random()*85+"%"; t.style.top = Math.random()*60+20+"%";
    t.innerText = "🎯"; 
    t.onmousedown = () => { count++; if(count < 10) spawn(); else finishStage(); };
    cv.appendChild(t);
  }
  spawn();
}

function initMove(cv) {
  let t = document.createElement("div"); t.className = "target"; t.innerText = "🛸"; cv.appendChild(t);
  let a = 0;
  function anim() { 
    if(currentStage !== 1) return; 
    a += 0.035; t.style.left = (50 + Math.cos(a)*35)+"%"; t.style.top = (50 + Math.sin(a*0.8)*35)+"%"; 
    requestAnimationFrame(anim); 
  }
  anim();
}

function initType(cv) {
  const words = ["ไม่อยากเรียนRMSE", "ILoveRMSE", "อยากนอนแล้ว"];
  let idx = 0;
  function update() {
    cv.innerHTML = `<div style="margin-top:60px"><div style="font-size:2rem; color:var(--neon); margin-bottom:15px">${words[idx]}</div><input type="text" id="typer" autofocus autocomplete="off"></div>`;
    const input = document.getElementById("typer");
    input.focus();
    input.oninput = (e) => { if(e.target.value === words[idx]) { idx++; if(idx < words.length) update(); else finishStage(); } };
  }
  update();
}

function initReflex(cv) {
  let count = 0;
  function next() {
    cv.style.background = "rgba(0,0,0,0.3)";
    cv.innerHTML = `<p style="margin-top:140px">เตรียมตัว... (${count}/3)</p>`;
    setTimeout(() => {
      if(currentStage !== 3) return;
      cv.style.background = "var(--accent)";
      cv.innerHTML = `<p style="margin-top:140px; font-weight:bold; font-size:1.8rem">CLICK!!!</p>`;
      cv.onmousedown = () => { cv.onmousedown = null; count++; if(count < 3) next(); else { cv.style.background="transparent"; finishStage(); } };
    }, Math.random() * 2500 + 1000);
  }
  next();
}

function initSteadyPath(cv) {
  // Balanced SVG Path: เว้นขอบซ้ายขวา 100px และจัดเลนให้อยู่กลาง
  cv.innerHTML = `
    <div class="maze-container" id="mazeCont">
      <svg width="100%" height="100%" viewBox="0 0 600 360" preserveAspectRatio="xMidYMid meet" style="position:absolute;">
        <path class="maze-road" d="M 100 60 H 500 V 180 H 100 V 300 H 500" />
        <path id="mazeTrigger" class="maze-trigger" d="M 100 60 H 500 V 180 H 100 V 300 H 500" />
      </svg>
      <div id="start-node" class="maze-point" style="left:150px; top:60px; background:var(--accent);">START</div>
      <div id="goal-node" class="maze-point" style="left:580px; top:300px; background:var(--neon); color:#000;">GOAL</div>
    </div>
  `;
  const trig = document.getElementById("mazeTrigger");
  const goal = document.getElementById("goal-node");

  trig.onmouseleave = (e) => {
    if(e.relatedTarget !== goal) {
      alert("⚠️ มือสั่น! คุณทำเมาส์หลุดจากเส้นทาง กรุณาเริ่มใหม่จากจุด START");
    }
  };

  goal.onmouseenter = () => {
    trig.onmouseleave = null; 
    finishStage();
  };
}

/* --- DATABASE EXPORT --- */
async function exportData() {
  const status = document.getElementById("save-status");
  const btn = document.getElementById("exportBtn");
  btn.disabled = true;
  status.innerText = "⌛ กำลังส่งสถิติพร้อมค่า Variance...";

  const payload = {
    mouse: getStats(mouseIntervals),
    click: getStats(clickIntervals),
    key: getStats(keyIntervals),
    idle: getStats(idleDurations)
  };

  try {
    const res = await fetch("/.netlify/functions/save-behavior", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    if (res.ok) {
      status.style.color = "var(--neon)";
      status.innerText = "บันทึกข้อมูลสำเร็จ! ตรวจสอบใน Neon DB ได้เลย ✅";
    } else { throw new Error("Server Error"); }
  } catch (err) {
    status.style.color = "var(--accent)";
    status.innerText = "❌ เกิดข้อผิดพลาด: " + err.message;
    btn.disabled = false;
  }
}

renderStage();
</script>
</body>
</html>
